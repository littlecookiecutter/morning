<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Morning</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f7f6f3;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* screens */
.screen {
    display: none;
    width: 100%;
    max-width: 520px;
    text-align: center;
    padding: 20px 0;
}
.active { display: block; }

/* title */
.title {
    font-size: 28px;
    font-weight: 400;
    margin-top: 20px;
    color: #2c2c2c;
}

/* quote */
.quote {
    font-size: 15px;
    color: #777;
    margin: 20px 40px;
    line-height: 1.5;
}

/* circle */
.circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin: 40px auto;

    background: radial-gradient(circle at 30% 30%, #ffd1a1, #ff8a3d);
    box-shadow:
        0 12px 30px rgba(255, 140, 60, 0.25),
        inset 0 -6px 12px rgba(255, 120, 40, 0.2);

    transition: transform 4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* breathing text */
.breath-text {
    font-size: 16px;
    color: #555;
    letter-spacing: 0.5px;
}

/* content blocks */
.block {
    background: white;
    border-radius: 18px;
    padding: 24px;
    margin: 12px;
    text-align: left;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    position: relative;
    border: 1px solid rgba(0,0,0,0.03);
}

.block b {
    font-weight: 500;
    display: block;
    margin-bottom: 12px;
    font-size: 16px;
    color: #2c2c2c;
    letter-spacing: -0.01em;
}

.block p {
    margin: 0;
    line-height: 1.8;
    color: #4a4a4a;
    font-size: 15px;
    font-weight: 300;
}

.block img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 14px;
}

/* Refresh button - Headspace style */
.refresh-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #f5f5f4;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: #787878;
    transition: all 0.2s ease;
    padding: 8px;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.refresh-btn:hover {
    background: #ff8a3d;
    color: white;
    transform: rotate(90deg);
}

.refresh-btn:active {
    transform: scale(0.95);
}

/* Original link - clean style */
.original-link {
    display: inline-block;
    margin-top: 14px;
    font-size: 13px;
    color: #ff8a3d;
    text-decoration: none;
    font-weight: 400;
    opacity: 0.9;
}

.original-link:hover {
    opacity: 1;
    text-decoration: underline;
}

/* Two-column layout for larger screens */
.content-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
    max-width: 900px;
    margin: 0 auto;
}

@media (min-width: 768px) {
    .content-grid {
        grid-template-columns: 1fr 1fr;
    }
    .block-full {
        grid-column: 1 / -1;
    }
}

/* Video block specific */
.video-container {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 aspect ratio */
    height: 0;
    overflow: hidden;
    border-radius: 12px;
    background: #000;
}
.video-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
}

/* skip */
.skip {
    margin-top: 20px;
    font-size: 13px;
    color: #999;
    cursor: pointer;
}

/* loading state */
.loading {
    color: #999;
    font-style: italic;
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="breathScreen" class="screen active">
    <div class="title">Good morning</div>
    <div class="quote" id="quote">Loading...</div>

    <div class="circle" id="circle"></div>
    <div class="breath-text" id="breathText">Inhale</div>

    <div class="skip" onclick="goNext()">skip</div>
</div>

<!-- SCREEN 2 -->
<div id="contentScreen" class="screen">
    <div id="content" class="content-grid"></div>
</div>

<script>

/* ---------- QUOTES & CONTENT ---------- */

async function loadMorningData() {
    try {
        const response = await fetch("http://localhost:3000/morning");
        const data = await response.json();
        
        // Set quote
        document.getElementById("quote").innerText = `${data.quote.text} — ${data.quote.author}`;
        
        // Store data for later use
        window.morningData = data;
    } catch (err) {
        console.error("Failed to load morning data:", err);
        document.getElementById("quote").innerText = "Be on your own side today.";
        window.morningData = null;
    }
}

loadMorningData();


/* ---------- BREATHING ---------- */

let phase = 0;
let cycles = 0;

const phases = [
    { text: "Inhale", scale: 1.1 },
    { text: "Hold", scale: 1.1 },
    { text: "Exhale", scale: 0.9 },
    { text: "Hold", scale: 0.9 }
];

const circle = document.getElementById("circle");
const text = document.getElementById("breathText");

function run() {
    const p = phases[phase];

    text.innerText = p.text;
    circle.style.transform = `scale(${p.scale})`;

    phase++;

    if (phase === phases.length) {
        phase = 0;
        cycles++;

        if (cycles >= 10) {
            goNext();
        }
    }
}

setInterval(run, 4000);
run();


/* ---------- NAV ---------- */

function goNext() {
    document.getElementById("breathScreen").classList.remove("active");
    document.getElementById("contentScreen").classList.add("active");
    
    // Load content when navigating
    renderContent();
}


/* ---------- CONTENT RENDER ---------- */

async function renderContent() {
    const el = document.getElementById("content");
    const data = window.morningData;
    
    if (!data) {
        el.innerHTML = '<div class="block"><p class="loading">Content unavailable. Please refresh.</p></div>';
        return;
    }

    const mlImg = data.ml.image ? `<img src="${data.ml.image}" alt="ML article">` : '';
    const healthImg = data.health.image ? `<img src="${data.health.image}" alt="Health article">` : '';
    
    const mlLink = data.ml.url ? `<a href="${data.ml.url}" target="_blank" class="original-link">Read original article →</a>` : '';
    const healthLink = data.health.url ? `<a href="${data.health.url}" target="_blank" class="original-link">Read original article →</a>` : '';

    el.innerHTML = `
    <div class="block">
        <button class="refresh-btn" onclick="refreshBlock('ml')" title="Get new article">🔄</button>
        <b>ML Insight</b>
        ${mlImg}
        <p>${data.ml.text}</p>
        ${mlLink}
    </div>

    <div class="block">
        <button class="refresh-btn" onclick="refreshBlock('health')" title="Get new article">🔄</button>
        <b>Medical Story</b>
        ${healthImg}
        <p>${data.health.text}</p>
        ${healthLink}
    </div>

    <div class="block block-full">
        <button class="refresh-btn" onclick="refreshBlock('video')" title="Get new video">🔄</button>
        <b>Inspiration</b>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/${data.video.id}" 
            frameborder="0" allowfullscreen></iframe>
        </div>
    </div>
    `;
}

async function refreshBlock(type) {
    try {
        const btn = event.target;
        btn.style.transform = 'rotate(360deg)';
        btn.style.transition = 'transform 0.5s';
        
        const response = await fetch("http://localhost:3000/refresh");
        const data = await response.json();
        
        // Update only the specific block
        if (type === 'ml') {
            window.morningData.ml = data.ml;
        } else if (type === 'health') {
            window.morningData.health = data.health;
        } else if (type === 'video') {
            window.morningData.video = data.video;
        }
        
        // Re-render
        renderContent();
        
        setTimeout(() => {
            btn.style.transform = 'rotate(0deg)';
        }, 500);
    } catch (err) {
        console.error("Failed to refresh:", err);
        alert("Could not load new content. Please try again.");
    }
}

</script>

</body>
</html>
